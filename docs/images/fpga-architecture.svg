  <rect x="135" y="90" width="320" height="330" rx="3" fill="none" stroke="#9c27b0" stroke-width="2.5" opacity="0.6"/>

  <!-- I/O Blocks - Left Side (centered on CLB row centers y=135,215,295,375) -->
