<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 558" width="590" height="558">
  <!-- Background -->
  <rect width="590" height="558" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="295" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">FPGA Architecture Overview</text>

  <!-- Horizontal Interconnect Lines (through CLB row centers y=135,215,295,375) -->
  <g stroke="#9c27b0" stroke-width="3" opacity="0.6">
    <line x1="80" y1="135" x2="510" y2="135"/>
    <line x1="80" y1="215" x2="510" y2="215"/>
    <line x1="80" y1="295" x2="510" y2="295"/>
    <line x1="80" y1="375" x2="510" y2="375"/>
  </g>

  <!-- Vertical Interconnect Lines (through CLB col centers x=175,255,335,415) -->
  <g stroke="#9c27b0" stroke-width="3" opacity="0.6">
    <line x1="175" y1="35" x2="175" y2="475"/>
    <line x1="255" y1="35" x2="255" y2="475"/>
    <line x1="335" y1="35" x2="335" y2="475"/>
    <line x1="415" y1="35" x2="415" y2="475"/>
  </g>

