<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Estrutura do Bloco Lógico Configurável (CLB)</text>
  
  <!-- CLB Container -->
  <rect x="250" y="60" width="400" height="200" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976d2">CLB</text>
  
  <!-- LUT Block -->
  <rect x="280" y="110" width="100" height="100" rx="5" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
  <text x="330" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565c0">LUT</text>
  <text x="330" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">(Tabela de</text>
  <text x="330" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">Consulta)</text>
  <text x="330" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">4-6 entradas</text>
  
  <!-- LUT Inputs -->
  <line x1="240" y1="130" x2="280" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="235" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#333">A</text>
  <line x1="240" y1="145" x2="280" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="235" y="140" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#333">B</text>
  <line x1="240" y1="160" x2="280" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="235" y="155" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#333">C</text>
  <line x1="240" y1="175" x2="280" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="235" y="170" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#333">D</text>
  
  <!-- LUT Output to Mux -->
  <line x1="380" y1="160" x2="420" y2="160" stroke="#333" stroke-width="1.5"/>
  
  <!-- Flip-Flop Block -->
  <rect x="420" y="135" width="80" height="90" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="2"/>
  <text x="460" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Flip</text>
  <text x="460" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Flop</text>
  <text x="460" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Armazenamento</text>
  
  <!-- Clock/Reset inputs -->
  <line x1="400" y1="210" x2="420" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="395" y="205" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#666">clk</text>
  <line x1="400" y1="225" x2="420" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="395" y="220" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#666">reset</text>
  
  <!-- FF Output to Mux -->
  <line x1="500" y1="180" x2="540" y2="180" stroke="#333" stroke-width="1.5"/>
  
  <!-- Multiplexer -->
  <polygon points="540,150 540,210 600,195 600,165" fill="#ffcc80" stroke="#f57c00" stroke-width="2"/>
  <text x="570" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Mux</text>
  
  <!-- Mux Select Line -->
  <line x1="560" y1="240" x2="570" y2="210" stroke="#d84315" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="550" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d84315">seleção</text>
  
  <!-- Final Output -->
  <line x1="600" y1="180" x2="650" y2="180" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="660" y="185" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Saída</text>
  
  <!-- Legend Section -->
  <rect x="50" y="290" width="800" height="190" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Funções do CLB</text>
  
  <!-- Legend Items -->
  <rect x="70" y="335" width="12" height="12" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="90" y="345" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">LUT:</tspan> Implementa funções lógicas combinacionais</text>
  
  <rect x="70" y="360" width="12" height="12" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="90" y="370" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Flip-Flop:</tspan> Armazena estado (lógica sequencial)</text>
  
  <rect x="70" y="385" width="12" height="12" fill="#ffcc80" stroke="#f57c00" stroke-width="1"/>
  <text x="90" y="395" font-family="Arial, sans-serif" font-size="12" fill="#333"><tspan font-weight="bold">Mux:</tspan> Seleciona entre saída da LUT (combinacional) ou FF (registrada)</text>
  
  <!-- Key Points -->
  <text x="450" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555">Pontos Importantes</text>
  
  <text x="70" y="445" font-family="Arial, sans-serif" font-size="11" fill="#555">• Fornece funcionalidade básica de lógica e armazenamento</text>
  <text x="70" y="462" font-family="Arial, sans-serif" font-size="11" fill="#555">• Executa funções lógicas complexas usando LUTs</text>
  <text x="450" y="445" font-family="Arial, sans-serif" font-size="11" fill="#555">• Sincroniza operações usando flip-flops com clock</text>
  <text x="450" y="462" font-family="Arial, sans-serif" font-size="11" fill="#555">• Pode gerar sinal combinacional ou registrado</text>
</svg>